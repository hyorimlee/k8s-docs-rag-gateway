apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-docs-rag-gateway
  labels:
    app: k8s-docs-rag-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-docs-rag-gateway
  template:
    metadata:
      labels:
        app: k8s-docs-rag-gateway
    spec:
      containers:
        - name: app
          image: k8s-docs-rag-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: k8s-docs-rag-gateway-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
